/* ============================ STOCKAGE LOCAL (IndexedDB) ============================ */
const _idb = {
  db: null,
  open() {
    return new Promise((res, rej) => {
      const r = indexedDB.open("foloneo-devis", 1);
      r.onupgradeneeded = () => r.result.createObjectStore("kv");
      r.onsuccess = () => { this.db = r.result; res(); };
      r.onerror = () => rej(r.error);
    });
  },
  async get(key) {
    if (!this.db) await this.open();
    return new Promise((res, rej) => {
      const t = this.db.transaction("kv").objectStore("kv").get(key);
      t.onsuccess = () => res(t.result == null ? null : { key, value: t.result });
      t.onerror = () => rej(t.error);
    });
  },
  async set(key, value) {
    if (!this.db) await this.open();
    return new Promise((res, rej) => {
      const t = this.db.transaction("kv", "readwrite").objectStore("kv").put(value, key);
      t.onsuccess = () => res({ key, value });
      t.onerror = () => rej(t.error);
    });
  },
};
window.storage = _idb;

/* ============================ CALCULS ============================ */
const achatFrom = (marque, ref) => {
  if (marque === "Ajax") return ref * 0.45;
  if (marque === "Dahua") return (ref / 1.2) * 0.45;
  return ref;
};
// Prix d'achat effectif : saisi manuellement si présent, sinon calculé depuis la référence
const achatOf = (p) => (p.pa != null && p.pa !== "" ? Number(p.pa) : achatFrom(p.m, Number(p.ref)));
const venteOf = (p, settings) =>
  p.pv != null && p.pv !== "" ? Number(p.pv) : achatOf(p) * (settings.coefs[p.cat] ?? 3);

const fmt = (n) =>
  (isFinite(n) ? n : 0).toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €";
const fmt0 = (n) => (isFinite(n) ? n : 0).toLocaleString("fr-FR", { maximumFractionDigits: 0 }) + " €";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const today = () => new Date().toISOString();
const dateFR = (iso) =>
  new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
const timeFR = (iso) =>
  new Date(iso).toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });

const computeQuote = (q, settings) => {
  // Les articles "mensuels" (télésurveillance, abonnements) sont facturés À PART, pas dans le total
  const lignesUniques = q.lignes.filter((l) => !l.mensuel);
  const lignesMensuelles = q.lignes.filter((l) => l.mensuel);
  const materiel = lignesUniques.reduce((s, l) => s + l.pv * l.qty, 0);
  const coutAchat = lignesUniques.reduce((s, l) => s + l.pa * l.qty, 0);
  const abonnementHT = lignesMensuelles.reduce((s, l) => s + l.pv * l.qty, 0);
  const abonnementTTC = abonnementHT * (1 + settings.tva / 100);
  const brut = materiel;
  const remise = brut * ((Number(q.remisePct) || 0) / 100);
  const totalHT = brut - remise;
  const tva = totalHT * (settings.tva / 100);
  const totalTTC = totalHT + tva;
  const marge = totalHT - coutAchat;
  const tauxMarge = totalHT > 0 ? marge / totalHT : 0;
  // LOCATION : prix TTC + 7 %/an si ≤ 10 000 € (sinon 5 %/an), le tout divisé par la durée en mois
  const loc = settings.location || { tauxBas: 7, tauxHaut: 5, seuil: 10000 };
  const tauxLocation = (totalTTC <= loc.seuil ? loc.tauxBas : loc.tauxHaut) / 100;
  const duree = Number(q.duree) || 48;
  const annees = duree / 12;
  const totalLocation = totalTTC * (1 + tauxLocation * annees);
  const mensTotalTTC = duree > 0 ? totalLocation / duree : 0;
  const mensTotalHT = mensTotalTTC / (1 + settings.tva / 100);
  return { materiel, coutAchat, remise, totalHT, tva, totalTTC, marge, tauxMarge, tauxLocation, totalLocation, mensTotalTTC, mensTotalHT, abonnementHT, abonnementTTC };
};

const eurPdf = (n) => {
  const s = (isFinite(n) ? n : 0).toFixed(2).replace(".", ",");
  return s.replace(/\B(?=(\d{3})+(?=,))/g, " ") + " €";
};
// Convertit une URL d'image web en dataURL — cascade : direct, puis proxys d'images publics
const fetchOneImage = async (u) => {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const r = await fetch(u, { mode: "cors", signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return null;
    const blob = await r.blob();
    if (!blob.type.startsWith("image/")) return null;
    return await new Promise((res) => {
      const fr = new FileReader();
      fr.onload = () => res(fr.result);
      fr.onerror = () => res(null);
      fr.readAsDataURL(blob);
    });
  } catch { return null; }
};
const urlToDataUrl = async (url) => {
  const enc = encodeURIComponent(url);
  const attempts = [
    url, // 1) tentative directe (si le serveur l'autorise)
    `https://wsrv.nl/?url=${enc}&w=320&h=320&fit=contain&cbg=white&output=jpg`, // 2) proxy d'images wsrv.nl
    `https://api.allorigins.win/raw?url=${enc}`, // 3) proxy générique en dernier recours
  ];
  for (const u of attempts) {
    const d = await fetchOneImage(u);
    if (d) return d;
  }
  return null;
};
// Normalise toute image en carré JPEG sur fond blanc (format sûr pour le PDF)
const normalizeForPdf = (dataUrl) =>
  new Promise((res) => {
    try {
      const img = new Image();
      img.onload = () => {
        try {
          const S = 300;
          const c = document.createElement("canvas");
          c.width = S; c.height = S;
          const ctx = c.getContext("2d");
          ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, S, S);
          const sc = Math.min(S / img.width, S / img.height) * 0.88;
          const w = img.width * sc, h = img.height * sc;
          ctx.drawImage(img, (S - w) / 2, (S - h) / 2, w, h);
          res(c.toDataURL("image/jpeg", 0.85));
        } catch { res(null); }
      };
      img.onerror = () => res(null);
      img.src = dataUrl;
    } catch { res(null); }
  });

    doc.text(`${eurPdf(t.abonnementTTC)} TTC /mois`, W - 56, yy + 6, { align: "right" });
    y += 30 + lignesMens.length * 14 + 24 + 16;
  }

  // Signature
  if (y > 700) { doc.addPage(); y = 50; }
  doc.setFontSize(9); doc.setTextColor(...grey);
  doc.text("Bon pour accord — Date et signature :", 40, y + 10);

  /* ---------- PAGES DE PRÉSENTATION DU SYSTÈME ---------- */

    // Regrouper les lignes par bloc (catégories intégrées, télésurveillance, autres) — hors prestations
    const ordre = ["alarme", "video", "acces", "interphonie", "incendie"];

    if (lsAutres.length) blocs.push({ ...PDF_BLOCS._autre, lignes: lsAutres });
    const lsMens = q.lignes.filter((l) => l.mensuel);
    if (lsMens.length) blocs.push({ ...PDF_BLOCS._mensuel, lignes: lsMens });

    if (blocs.length) {
      doc.addPage();
      // Bandeau
      doc.setFillColor(...navy); doc.rect(0, 0, W, 74, "F");
      doc.setTextColor(...cream); doc.setFont("helvetica", "bold"); doc.setFontSize(17);
      doc.text("VOTRE PROJET DE SÉCURITÉ", 40, 38);
      doc.setFontSize(8); doc.setTextColor(...gold);
      doc.text("UNE PROTECTION PENSÉE POUR VOUS, INSTALLÉE ET SUIVIE PAR FOLONEO", 40, 56);
      let py = 100;
      // Introduction savoir-faire
      doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(...dark);
      const intro = "FOLONEO conçoit et installe des systèmes de sécurité électronique sur mesure, pour les particuliers comme pour les professionnels. Chaque projet est étudié, installé et suivi par nos soins, avec une exigence simple : que vous n'ayez plus à y penser. Voici ce que le système que nous vous proposons va changer pour vous.";
      const introLines = doc.splitTextToSize(intro, W - 80);
      doc.text(introLines, 40, py);
      py += introLines.length * 13 + 14;

      const newPageIfNeeded = (needed) => {
        if (py + needed > 770) { doc.addPage(); py = 56; }
      };

      blocs.forEach((b) => {
        const uniq = [];
        b.lignes.forEach((l) => { if (!uniq.some((u) => u.pid === l.pid)) uniq.push(l); });
        const nbImgs = Math.min(uniq.length, 5);
        doc.setFont("helvetica", "normal"); doc.setFontSize(9.5);
        const txtLines = doc.splitTextToSize(b.texte, W - 80);
        const imgRowH = nbImgs > 0 ? 108 : 0;
        newPageIfNeeded(30 + txtLines.length * 12 + imgRowH + 20);
        // Titre du bloc
        doc.setFont("helvetica", "bold"); doc.setFontSize(12.5); doc.setTextColor(...navy);
        doc.text(b.titre, 40, py);
        doc.setDrawColor(...gold); doc.setLineWidth(1.4);
        doc.line(40, py + 5, 40 + doc.getTextWidth(b.titre), py + 5);
        py += 20;
        // Texte
        doc.setFont("helvetica", "normal"); doc.setFontSize(9.5); doc.setTextColor(70, 78, 92);
        doc.text(txtLines, 40, py);
        py += txtLines.length * 12 + 10;
        // Images des produits (sans référence : libellé client uniquement)
        if (nbImgs > 0) {
          const size = 72;
          const gap = (W - 80 - nbImgs * size) / Math.max(nbImgs - 1, 1);
          uniq.slice(0, 5).forEach((l, i) => {
            const x = 40 + i * (size + (nbImgs > 1 ? gap : 0));
            try {
              if (imgs[l.pid]) {
                doc.setDrawColor(...gold); doc.setLineWidth(1);
                doc.roundedRect(x, py, size, size, 6, 6, "S");
                doc.addImage(imgs[l.pid], "JPEG", x + 2, py + 2, size - 4, size - 4);
              } else {
                doc.setFillColor(...navy);
                doc.roundedRect(x, py, size, size, 6, 6, "F");
                doc.setTextColor(...gold); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
                doc.text((l.lc || l.n || "?").charAt(0).toUpperCase(), x + size / 2, py + size / 2 + 8, { align: "center" });
              }
            } catch (e) { /* image illisible : on continue */ }
            // Légende (2 lignes max)
            doc.setFont("helvetica", "normal"); doc.setFontSize(6.6); doc.setTextColor(...grey);
            const cap = doc.splitTextToSize(l.lc || "", size + 6).slice(0, 2);
            doc.text(cap, x + size / 2, py + size + 10, { align: "center" });
          });
          py += size + 32;
        }
        py += 6;
      });

      // Engagement FOLONEO
      newPageIfNeeded(105);
      doc.setFillColor(...cream); doc.setDrawColor(...navy); doc.setLineWidth(1);
      doc.roundedRect(40, py, W - 80, 88, 8, 8, "FD");
      doc.setTextColor(...navy); doc.setFont("helvetica", "bold"); doc.setFontSize(10);
      doc.text("L'ENGAGEMENT FOLONEO", 56, py + 20);
      doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.setTextColor(...dark);
      const engagements = [
        "Installateur certifié NFA2P — le référentiel des assureurs",
        "Télésurveillance via plusieurs centres partenaires certifiés APSAD P5",
        "Un service de proximité inégalé — société basée à Toulon, intervenant dans toute la France",
      ];
      engagements.forEach((e, i) => {
        doc.setFillColor(...gold);
        doc.circle(62, py + 36 + i * 16, 2.2, "F");
        doc.text(e, 72, py + 39 + i * 16);
      });
    }
  } catch (e) {
    // La présentation ne doit jamais empêcher l'export du devis, mais on signale le problème
    try { window.alert("La page de présentation n'a pas pu être générée : " + ((e && e.message) || e) + "\n\nLe devis reste complet et valide. Envoie ce message à ton support pour correction."); } catch (_) { }
  }

  // Pied de page (toutes les pages)
  const pages = doc.getNumberOfPages();
  for (let i = 1; i <= pages; i++) {
    doc.setPage(i);
    doc.setFontSize(7.5); doc.setTextColor(...grey); doc.setFont("helvetica", "normal");
    doc.text("FOLONEO EURL — Toulon  ·  04 87 86 01 19  ·  contact@foloneo.fr  ·  www.foloneo.fr", W / 2, 812, { align: "center" });
    doc.text("Devis établi sous réserve de visite technique.", W / 2, 824, { align: "center" });
    doc.setFontSize(6); doc.text("v11 · " + i + "/" + pages, W - 30, 824, { align: "right" });
  }

  const cleanName = (q.client.nom || "").replace(/[^\wÀ-ÿ-]+/g, "_").slice(0, 30);
  const fileName = `${q.num}${cleanName ? "-" + cleanName : ""}.pdf`;
  const blob = doc.output("blob");
  try {
    const file = new File([blob], fileName, { type: "application/pdf" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file] }); // pas de titre : iOS l'ajouterait en pièce jointe .txt
      return true;
    }
  } catch (e) { if (e && e.name === "AbortError") return true; }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = fileName;
  a.click();
  return true;
};

const KEYS = { catalog: "foloneo-devis-catalog", quotes: "foloneo-devis-quotes", journal: "foloneo-devis-journal", settings: "foloneo-devis-settings" };
async function loadKey(key, fallback) {

/* ============================ COMPRESSION PHOTO ============================ */
const compressImage = (file) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const max = 320;
        const scale = Math.min(1, max / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });

/* ============================ RECHERCHE PHOTO WEB (IA) ============================ */
const testImageUrl = (url) =>
  new Promise((resolve) => {
    if (!url || !/^https:\/\//.test(url)) return resolve(false);
    const img = new Image();
    const timer = setTimeout(() => resolve(false), 6000);
    img.onload = () => { clearTimeout(timer); resolve(img.width > 60); };
    img.onerror = () => { clearTimeout(timer); resolve(false); };
    img.src = url;
  });

const bingThumb = (q, srv = 2) =>
  `https://tse${srv}.mm.bing.net/th?q=${encodeURIComponent(q)}&w=480&h=480&c=7&rs=1&p=0`;

const findWebImage = async (product) => {
  const base = `${product.m === "FOLONEO" || product.m === "Autre" ? "" : product.m + " "}${product.n}`;
  // 1) Vignettes moteur de recherche — direct et rapide
  const candidates = [
    bingThumb(base, 2),
    bingThumb(base + " produit", 1),
    bingThumb(base + " " + product.lc.split(" ").slice(0, 3).join(" "), 3),
  ];
  for (const u of candidates) {
    if (await testImageUrl(u)) return u;
  }
  // 2) Secours : IA avec recherche web
  const query = base;
  const prompt = `Trouve la photo produit officielle (fond blanc ou studio) pour ce matériel de sécurité électronique : "${query}" (${product.lc}). Utilise la recherche web pour trouver une URL DIRECTE vers un fichier image (.jpg, .png ou .webp) — pas une page web. Privilégie le site du fabricant ou d'un distributeur connu. Réponds UNIQUEMENT avec ce JSON, sans texte autour ni backticks : {"urls":["url1","url2","url3"]} — donne 2 à 3 URLs candidates.`;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }],
        tools: [{ type: "web_search_20250305", name: "web_search" }],
      }),
    });
    const data = await r.json();
    const text = (data.content || []).filter((i) => i.type === "text").map((i) => i.text).join("\n");
    let urls = [];
    try {
      const clean = text.replace(/```json|```/g, "").trim();
      const start = clean.indexOf("{");
      const end = clean.lastIndexOf("}");
      if (start >= 0 && end > start) urls = JSON.parse(clean.slice(start, end + 1)).urls || [];
    } catch { /* on retombe sur l'extraction regex */ }
    if (!urls.length) {
      const found = text.match(/https:\/\/[^\s"'<>)\]]+\.(?:jpg|jpeg|png|webp)(?:\?[^\s"'<>)\]]*)?/gi) || [];
      urls = found;
    }
    for (const u of urls.slice(0, 4)) {
      if (await testImageUrl(u)) return u;
    }
  } catch (e) { /* réseau indisponible : on garde l'icône */ }
  return null;
};

/* ============================ APPLICATION ============================ */
function App() {
  const [ready, setReady] = useState(false);
  const [catalog, setCatalog] = useState([]);
  const [quotes, setQuotes] = useState([]);
  const [journal, setJournal] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [tab, setTab] = useState("devis");
  const [editQuoteId, setEditQuoteId] = useState(null);
  const [editProduct, setEditProduct] = useState(null); // null | "new" | product
  const [picker, setPicker] = useState(false);
  const [presentation, setPresentation] = useState(false);
  const [saveState, setSaveState] = useState("ok"); // ok | saving | error
  const [toast, setToast] = useState(null);
  const [magic, setMagic] = useState(null); // null | {current, done, total, found, name}
  const magicStop = useRef(false);
  const saveTimer = useRef(null);

  /* ---------- Chargement initial ---------- */
  useEffect(() => {
    (async () => {
      const seeded = SEED_PRODUCTS.map((p) => ({ id: uid() + Math.random().toString(36).slice(2, 5), ...p, photo: p.photo || null, actif: true }));
      const [cat, qts, jnl, stg] = await Promise.all([
        loadKey(KEYS.catalog, null),
        loadKey(KEYS.quotes, []),
        loadKey(KEYS.journal, []),
        loadKey(KEYS.settings, null),
      ]);
      // Fusion : on garde le catalogue existant (avec ses photos et modifs) et on ajoute uniquement les nouveaux produits de base
      let mergedCat = cat || seeded;
      if (cat) {
        const news = seeded.filter((s) => !cat.some((c) => c.m === s.m && c.n === s.n));
        if (news.length) mergedCat = [...cat, ...news];
      }
      setCatalog(mergedCat);
      setQuotes(qts);
      setJournal(jnl);
      setSettings(stg ? { ...DEFAULT_SETTINGS, ...stg } : DEFAULT_SETTINGS);
      setReady(true);
    })();
  }, []);

  /* ---------- Sauvegarde automatique ---------- */
  useEffect(() => {
    if (!ready) return;
    setSaveState("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await Promise.all([
          window.storage.set(KEYS.catalog, JSON.stringify(catalog)),
          window.storage.set(KEYS.quotes, JSON.stringify(quotes)),
          window.storage.set(KEYS.journal, JSON.stringify(journal.slice(0, 400))),
          window.storage.set(KEYS.settings, JSON.stringify(settings)),
        ]);
        setSaveState("ok");
      } catch (e) {
        setSaveState("error");
      }
    }, 500);
    return () => clearTimeout(saveTimer.current);
  }, [catalog, quotes, journal, settings, ready]);

  const log = useCallback((message) => {
    setJournal((j) => [{ id: uid(), ts: today(), message }, ...j].slice(0, 400));
  }, []);
  const notify = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  /* ---------- Actions devis ---------- */
  const newQuote = () => {
    const num = `DEV-${new Date().getFullYear()}-${String(settings.seqDevis).padStart(3, "0")}`;
    const q = {
      id: uid(), num, date: today(), statut: "brouillon",
      client: { nom: "", dirigeant: "", adresse: "", ville: "", tel: "", email: "", siret: "" },
      lignes: [], remisePct: 0, duree: 48, notes: "",
    };
    setQuotes((qs) => [q, ...qs]);
    setSettings((s) => ({ ...s, seqDevis: s.seqDevis + 1 }));
    log(`Création du devis ${num}`);
    setEditQuoteId(q.id);
  };
  const patchQuote = (id, patch) => setQuotes((qs) => qs.map((q) => (q.id === id ? { ...q, ...patch } : q)));
  const deleteQuote = (q) => {
    if (!window.confirm(`Supprimer le devis ${q.num} ?`)) return;
    setQuotes((qs) => qs.filter((x) => x.id !== q.id));
    log(`Suppression du devis ${q.num} (${q.client.nom || "sans client"})`);
    setEditQuoteId(null);
  };
  const duplicateQuote = (q) => {
    const num = `DEV-${new Date().getFullYear()}-${String(settings.seqDevis).padStart(3, "0")}`;
    const copy = { ...q, id: uid(), num, date: today(), statut: "brouillon" };
    setQuotes((qs) => [copy, ...qs]);
    setSettings((s) => ({ ...s, seqDevis: s.seqDevis + 1 }));
    log(`Duplication du devis ${q.num} → ${num}`);
    setEditQuoteId(copy.id);
    notify("Devis dupliqué");
  };

  /* ---------- Actions produits ---------- */
  const saveProduct = (p) => {
    if (p.id) {
      setCatalog((c) => c.map((x) => (x.id === p.id ? p : x)));
      log(`Modification produit : ${p.n}`);
    } else {
      const np = { ...p, id: uid(), actif: true };
      setCatalog((c) => [np, ...c]);
      log(`Création produit : ${p.n} (${p.m})`);
    }
    setEditProduct(null);
    notify("Produit enregistré");
  };
  const deleteProduct = (p) => {
    if (!window.confirm(`Supprimer « ${p.n} » du catalogue ?`)) return;
    setCatalog((c) => c.filter((x) => x.id !== p.id));
    log(`Suppression produit : ${p.n}`);
    setEditProduct(null);
  };
  // Réorganisation : déplace un produit dans sa catégorie (dir = -1 monter, +1 descendre, ou targetId pour glisser)
  const moveProduct = (p, dir, targetId) => {
    setCatalog((c) => {
      const group = c.filter((x) => x.cat === p.cat).sort(byOrd);
      const i = group.findIndex((x) => x.id === p.id);
      if (i < 0) return c;
      let j;
      if (targetId) {
        j = group.findIndex((x) => x.id === targetId);
        if (j < 0) return c;
      } else {
        j = i + dir;
        if (j < 0 || j >= group.length) return c;
      }
      const arr = [...group];
      const [it] = arr.splice(i, 1);
      arr.splice(j, 0, it);
      const ordMap = {};
      arr.forEach((x, k) => { ordMap[x.id] = k; });
      return c.map((x) => (ordMap[x.id] != null ? { ...x, ord: ordMap[x.id] } : x));
    });
  };

  /* ---------- Récupération automatique des photos web ---------- */
  const runMagicPhotos = async () => {
    const targets = catalog.filter((p) => !p.photo && !p.img && p.m !== "FOLONEO");
    if (!targets.length) { notify("Toutes les photos sont déjà en place"); return; }
    magicStop.current = false;
    const total = targets.length;
    let done = 0, found = 0;
    setMagic({ current: "", done: 0, total, found: 0 });
    const queue = [...targets];
    const worker = async () => {
      while (queue.length && !magicStop.current) {
        const p = queue.shift();
        setMagic((m) => (m ? { ...m, current: p.n } : m));
        const url = await findWebImage(p);
        if (url) {
          found++;
          setCatalog((c) => c.map((x) => (x.id === p.id ? { ...x, img: url } : x)));
          log(`Photo web trouvée pour « ${p.n} »`);
        }
        done++;
        setMagic((m) => (m ? { ...m, done, found } : m));
      }
    };
    await Promise.all([worker(), worker(), worker()]);
    setMagic(null);
    log(`Recherche photos web terminée : ${found} photo(s) ajoutée(s) sur ${total}`);
    notify(`${found} photo(s) récupérée(s)`);
  };

  /* ---------- Export / Import ---------- */
  const exportAll = () => {
    const data = JSON.stringify({ catalog, quotes, journal, settings, exportedAt: today() }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `foloneo-devis-sauvegarde-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    log("Export de la base complète (JSON)");
  };
  const importAll = (file) => {
    const r = new FileReader();
    r.onload = (e) => {
      try {
        const d = JSON.parse(e.target.result);
        if (d.catalog) setCatalog(d.catalog);
        if (d.quotes) setQuotes(d.quotes);
        if (d.settings) setSettings({ ...DEFAULT_SETTINGS, ...d.settings });
        if (d.journal) setJournal(d.journal);
        log("Import d'une sauvegarde JSON");
        notify("Sauvegarde importée");
      } catch { notify("Fichier invalide"); }
    };
    r.readAsText(file);
  };

  if (!ready)
    return (
      <div className="flex flex-col items-center justify-center min-h-screen gap-3" style={{ background: C.navy }}>
        <div style={{ ...serif, color: C.cream, fontSize: 28, fontWeight: 700 }}>FOLONEO</div>
        <div style={{ color: C.gold, fontSize: 13, letterSpacing: "0.2em" }}>DEVIS TERRAIN</div>
      </div>
    );

  const currentQuote = quotes.find((q) => q.id === editQuoteId);

  /* ============================ RENDU ============================ */
  return (
    <div className="min-h-screen" style={{ background: C.cream, color: C.navy, maxWidth: 480, margin: "0 auto", position: "relative", paddingBottom: 90 }}>
      {/* ---------- HEADER ---------- */}
      <header className="flex items-center justify-between px-4 pb-3 sticky top-0 z-30" style={{ background: C.navy, paddingTop: "calc(14px + env(safe-area-inset-top))" }}>
        <div>
          <div style={{ ...serif, color: C.cream, fontSize: 20, fontWeight: 700, lineHeight: 1 }}>FOLONEO</div>
          <div style={{ color: C.gold, fontSize: 10, letterSpacing: "0.25em", marginTop: 3 }}>DEVIS TERRAIN</div>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={() => setSettings((s) => ({ ...s, modeClient: !s.modeClient }))}
            className="flex items-center gap-1.5"
            style={{ background: settings.modeClient ? C.gold : "rgba(255,255,255,0.08)", color: settings.modeClient ? C.navy : C.cream, padding: "7px 12px", borderRadius: 99, fontSize: 12, fontWeight: 700 }}>
            {settings.modeClient ? <Eye size={14} /> : <EyeOff size={14} />}
            {settings.modeClient ? "Mode client" : "Interne"}
          </button>
          <div title={saveState === "ok" ? "Tout est enregistré" : saveState === "saving" ? "Enregistrement…" : "Erreur d'enregistrement"}
            style={{ width: 10, height: 10, borderRadius: 99, background: saveState === "ok" ? C.green : saveState === "saving" ? C.gold : C.red }} />
        </div>
      </header>

      {/* ---------- CONTENU ---------- */}
      {tab === "devis" && !currentQuote && (
        <QuoteList quotes={quotes} settings={settings} onOpen={setEditQuoteId} onNew={newQuote} />
      )}
      {tab === "devis" && currentQuote && (
        <QuoteEditor
          quote={currentQuote} settings={settings} catalog={catalog}
          onBack={() => setEditQuoteId(null)} onPatch={(p) => patchQuote(currentQuote.id, p)}
          onDelete={() => deleteQuote(currentQuote)} onDuplicate={() => duplicateQuote(currentQuote)}
          onPick={() => setPicker(true)} onPresent={() => setPresentation(true)} log={log}
        />
      )}
      {tab === "catalogue" && (
        <Catalog catalog={catalog} settings={settings} onEdit={setEditProduct} onNew={() => setEditProduct("new")} onMagic={runMagicPhotos} magicRunning={!!magic} onMove={moveProduct} />
      )}

      {/* ---------- PROGRESSION PHOTOS WEB ---------- */}
      {magic && (
        <div className="fixed inset-0 z-50 flex items-center justify-center px-8" style={{ background: "rgba(10,22,40,0.88)" }}>
          <div className="w-full text-center" style={{ background: C.cream, borderRadius: 20, padding: 24 }}>
            <Sparkles size={30} color={C.gold} style={{ margin: "0 auto 10px" }} />
            <div style={{ ...serif, fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Récupération des photos</div>
            <div style={{ fontSize: 13, color: C.grey, marginBottom: 14 }}>
              {magic.done}/{magic.total} produits · {magic.found} photo{magic.found > 1 ? "s" : ""} trouvée{magic.found > 1 ? "s" : ""}
            </div>
            <div style={{ height: 8, borderRadius: 99, background: C.line, overflow: "hidden", marginBottom: 10 }}>
              <div style={{ height: "100%", width: `${(magic.done / magic.total) * 100}%`, background: C.orange, transition: "width .3s" }} />
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, minHeight: 18 }}>{magic.current}</div>
            <p style={{ fontSize: 12, color: C.grey, margin: "10px 0 14px" }}>L'app cherche les photos officielles sur le web. Tu peux la laisser tourner, tout s'enregistre au fur et à mesure.</p>
            <Btn small variant="ghost" onClick={() => { magicStop.current = true; }}>Arrêter</Btn>
          </div>
        </div>
      )}
      {tab === "journal" && <Journal journal={journal} />}
      {tab === "reglages" && (
        <SettingsScreen settings={settings} setSettings={setSettings} onExport={exportAll} onImport={importAll} log={log} />
      )}

      {/* ---------- MODALES ---------- */}
      {picker && currentQuote && (
        <ProductPicker
          catalog={catalog} settings={settings} onClose={() => setPicker(false)}
          quantities={Object.fromEntries(currentQuote.lignes.map((l) => [l.pid, l.qty]))}
          onAdd={(p) => {
            const pv = venteOf(p, settings);
            const pa = achatOf(p);
            const existing = currentQuote.lignes.find((l) => l.pid === p.id);
            const lignes = existing
              ? currentQuote.lignes.map((l) => (l.pid === p.id ? { ...l, qty: l.qty + 1 } : l))
              : [...currentQuote.lignes, { pid: p.id, n: p.n, lc: p.lc, m: p.m, cat: p.cat, photo: p.photo, img: p.img, mensuel: !!p.mensuel, qty: 1, pv, pa }];
            patchQuote(currentQuote.id, { lignes });
            log(`Ajout de « ${p.n} » au devis ${currentQuote.num}`);
          }}
          onRemove={(p) => {
            const lignes = currentQuote.lignes
              .map((l) => (l.pid === p.id ? { ...l, qty: l.qty - 1 } : l))
              .filter((l) => l.qty > 0);
            patchQuote(currentQuote.id, { lignes });
          }}
        />
      )}
      {editProduct && (
        <ProductForm
          product={editProduct === "new" ? null : editProduct} settings={settings}
          onSave={saveProduct} onDelete={deleteProduct} onClose={() => setEditProduct(null)}
        />
      )}
      {presentation && currentQuote && (
        <ClientPresentation quote={currentQuote} settings={settings} onClose={() => setPresentation(false)} />
      )}

      {/* ---------- TOAST ---------- */}
      {toast && (
        <div className="fixed left-1/2 z-50 flex items-center gap-2" style={{ bottom: 100, transform: "translateX(-50%)", background: C.navy, color: C.cream, padding: "10px 18px", borderRadius: 99, fontSize: 14, fontWeight: 600, boxShadow: "0 8px 24px rgba(10,22,40,0.35)" }}>
          <CheckCircle2 size={16} color={C.gold} /> {toast}
        </div>
      )}

      {/* ---------- BARRE D'ONGLETS ---------- */}
      <nav className="fixed bottom-0 left-1/2 z-40 flex justify-around items-center" style={{ transform: "translateX(-50%)", width: "100%", maxWidth: 480, background: C.navy, padding: "10px 8px calc(14px + env(safe-area-inset-bottom))", borderTop: `1px solid rgba(201,169,97,0.25)` }}>
        {[
          { id: "devis", l: "Devis", I: FileText },
          { id: "catalogue", l: "Catalogue", I: Package },
          { id: "journal", l: "Journal", I: Clock },
          { id: "reglages", l: "Réglages", I: Settings },
        ].map(({ id, l, I }) => (
          <button key={id} onClick={() => { setTab(id); setEditQuoteId(null); }}
            className="flex flex-col items-center gap-1" style={{ color: tab === id ? C.gold : "rgba(250,247,242,0.5)", minWidth: 64 }}>
            <I size={22} />
            <span style={{ fontSize: 10, fontWeight: 700 }}>{l}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ============================ LISTE DES DEVIS ============================ */

  const [search, setSearch] = useState("");
  const filtered = quotes.filter((q) =>
    (q.client.nom + q.num + q.client.ville).toLowerCase().includes(search.toLowerCase())
  );
  return (
    <div className="px-4 pt-4">
      <div className="flex items-center justify-between mb-4">
        <h1 style={{ ...serif, fontSize: 26, fontWeight: 700 }}>Devis</h1>
        <Btn onClick={onNew} small><Plus size={16} /> Nouveau</Btn>
      </div>
      <div className="relative mb-4">
        <Search size={17} style={{ position: "absolute", left: 14, top: 14, color: C.grey }} />
        <input style={{ ...inputStyle, paddingLeft: 42 }} placeholder="Rechercher un client, un n° de devis…" value={search} onChange={(e) => setSearch(e.target.value)} />
      </div>
      {filtered.length === 0 && (
        <div className="text-center py-16">
          <FileText size={40} style={{ color: C.gold, margin: "0 auto 12px" }} />
          <p style={{ color: C.grey, fontSize: 15 }}>Aucun devis pour l'instant.<br />Appuie sur « Nouveau » pour chiffrer une installation.</p>
        </div>
      )}
      <div className="flex flex-col gap-3">
        {filtered.map((q) => {
          const t = computeQuote(q, settings);
          return (
            <button key={q.id} onClick={() => onOpen(q.id)} className="text-left active:opacity-70"
              style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}` }}>
              <div className="flex items-center justify-between mb-1">
                <span style={{ fontSize: 12, fontWeight: 700, color: C.grey }}>{q.num} · {dateFR(q.date)}</span>
                <StatusChip s={q.statut} />
              </div>
              <div className="flex items-center justify-between">
                <div>
                  <div style={{ fontSize: 17, fontWeight: 700 }}>{q.client.nom || "Client à renseigner"}</div>
                  {q.client.ville && <div style={{ fontSize: 13, color: C.grey }}>{q.client.ville}</div>}
                </div>
                <div className="text-right">
                  <div style={{ ...serif, fontSize: 18, fontWeight: 700 }}>{fmt0(t.totalHT)} <span style={{ fontSize: 11, color: C.grey }}>HT</span></div>
                  <div style={{ fontSize: 12, color: C.gold, fontWeight: 700 }}>ou {fmt0(t.mensTotalTTC)}/mois TTC</div>
                </div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ============================ ÉDITEUR DE DEVIS ============================ */
function QuoteEditor({ quote, settings, catalog, onBack, onPatch, onDelete, onDuplicate, onPick, onPresent, log }) {
  const t = computeQuote(quote, settings);
  const mc = settings.modeClient;
  const [exporting, setExporting] = useState(false);
  const setLigne = (pid, patch) =>
    onPatch({ lignes: quote.lignes.map((l) => (l.pid === pid ? { ...l, ...patch } : l)).filter((l) => l.qty > 0) });

  return (
    <div className="px-4 pt-4">
      <div className="flex items-center justify-between mb-3">
        <button onClick={onBack} className="flex items-center gap-1" style={{ color: C.orange, fontWeight: 700, fontSize: 15 }}>
          <ChevronLeft size={20} /> Retour
        </button>
        <div className="flex gap-2">
          <Btn variant="ghost" small onClick={onDuplicate}><Copy size={15} /></Btn>
          <Btn variant="danger" small onClick={onDelete}><Trash2 size={15} /></Btn>
        </div>
      </div>

      <div className="flex items-center justify-between mb-4">
        <h1 style={{ ...serif, fontSize: 22, fontWeight: 700 }}>{quote.num}</h1>
        <select value={quote.statut} onChange={(e) => { onPatch({ statut: e.target.value }); log(`Devis ${quote.num} → statut « ${e.target.value} »`); }}
          style={{ ...inputStyle, width: "auto", padding: "8px 12px", fontSize: 13, fontWeight: 700 }}>
          <option value="brouillon">Brouillon</option>
          <option value="envoye">Envoyé</option>
          <option value="accepte">Accepté</option>
          <option value="refuse">Refusé</option>
        </select>
      </div>

      {/* Client */}
      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div className="flex items-center gap-2 mb-3" style={{ color: C.navy, fontWeight: 700, fontSize: 14 }}><User size={16} color={C.gold} /> CLIENT</div>
        <Field label="NOM / SOCIÉTÉ"><input style={inputStyle} value={quote.client.nom} placeholder="Ex. Bijouterie Azur" onChange={(e) => onPatch({ client: { ...quote.client, nom: e.target.value } })} /></Field>
        <Field label="DIRIGEANT / CONTACT (FACULTATIF)"><input style={inputStyle} value={quote.client.dirigeant || ""} placeholder="Ex. M. Martin" onChange={(e) => onPatch({ client: { ...quote.client, dirigeant: e.target.value } })} /></Field>
        <Field label="ADRESSE (FACULTATIF)"><input style={inputStyle} value={quote.client.adresse || ""} placeholder="Ex. 12 rue de la République" onChange={(e) => onPatch({ client: { ...quote.client, adresse: e.target.value } })} /></Field>
        <div className="grid grid-cols-2 gap-3">
          <Field label="VILLE"><input style={inputStyle} value={quote.client.ville} placeholder="Toulon" onChange={(e) => onPatch({ client: { ...quote.client, ville: e.target.value } })} /></Field>
          <Field label="TÉLÉPHONE"><input style={inputStyle} type="tel" value={quote.client.tel} placeholder="06…" onChange={(e) => onPatch({ client: { ...quote.client, tel: e.target.value } })} /></Field>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="EMAIL (FACULTATIF)"><input style={inputStyle} type="email" value={quote.client.email || ""} placeholder="client@…" onChange={(e) => onPatch({ client: { ...quote.client, email: e.target.value } })} /></Field>
          <Field label="SIRET (FACULTATIF)"><input style={inputStyle} inputMode="numeric" value={quote.client.siret || ""} placeholder="123 456 789…" onChange={(e) => onPatch({ client: { ...quote.client, siret: e.target.value } })} /></Field>
        </div>
      </section>

      {/* Lignes */}
      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div className="flex items-center justify-between mb-3">
          <div className="flex items-center gap-2" style={{ fontWeight: 700, fontSize: 14 }}><Package size={16} color={C.gold} /> MATÉRIEL & PRESTATIONS</div>
          <Btn small onClick={onPick}><Plus size={15} /> Ajouter</Btn>
        </div>
        {quote.lignes.length === 0 && <p style={{ color: C.grey, fontSize: 14 }}>Aucune ligne. Ajoute des produits du catalogue.</p>}
        <div className="flex flex-col gap-3">
          {quote.lignes.map((l) => (
            <div key={l.pid} className="flex items-center gap-3" style={{ borderBottom: `1px solid ${C.line}`, paddingBottom: 10 }}>
              <ProductPhoto p={l} size={46} />
              <div className="flex-1 min-w-0">
                <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.2 }}>{mc ? l.lc : l.n}</div>
                <div style={{ fontSize: 12, color: l.mensuel ? C.gold : C.grey, fontWeight: l.mensuel ? 700 : 400 }}>
                  {mc ? "" : `${l.m} · `}{fmt(l.pv)}{l.mensuel ? " /mois — facturé à part" : " / u"}
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setLigne(l.pid, { qty: l.qty - 1 })} style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${C.line}`, color: C.navy }}><Minus size={14} style={{ margin: "0 auto" }} /></button>
                <span style={{ fontWeight: 700, minWidth: 22, textAlign: "center" }}>{l.qty}</span>
                <button onClick={() => setLigne(l.pid, { qty: l.qty + 1 })} style={{ width: 30, height: 30, borderRadius: 8, background: C.navy, color: C.cream }}><Plus size={14} style={{ margin: "0 auto" }} /></button>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* Ajustements */}
      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div className="flex items-center gap-2 mb-3" style={{ fontWeight: 700, fontSize: 14 }}><CircleDollarSign size={16} color={C.gold} /> AJUSTEMENTS</div>
        <Field label="REMISE %"><input style={inputStyle} type="number" inputMode="decimal" value={quote.remisePct} onChange={(e) => onPatch({ remisePct: e.target.value })} /></Field>
        <Field label="DURÉE LOCATION">
          <div className="flex gap-2">
            {[36, 48, 60].map((d) => (
              <button key={d} onClick={() => onPatch({ duree: d })} className="flex-1 font-bold"
                style={{ padding: "12px 0", borderRadius: 12, background: quote.duree === d ? C.navy : C.cream, color: quote.duree === d ? C.gold : C.navy, border: `1px solid ${quote.duree === d ? C.navy : C.line}`, fontSize: 15 }}>
                {d} mois
              </button>
            ))}
          </div>
        </Field>
        <Field label="NOTES INTERNES"><textarea style={{ ...inputStyle, minHeight: 60 }} value={quote.notes} onChange={(e) => onPatch({ notes: e.target.value })} placeholder="Contraintes du site, accès, câblage…" /></Field>
      </section>

      {/* Double proposition — signature FOLONEO */}
      <div className="grid grid-cols-2 gap-3 mb-4">
        <div style={{ background: C.navy, borderRadius: 18, padding: 16, color: C.cream }}>
          <div style={{ fontSize: 11, letterSpacing: "0.15em", color: "rgba(250,247,242,0.6)", fontWeight: 700 }}>ACHAT</div>
          <div style={{ ...serif, fontSize: 24, fontWeight: 700, margin: "8px 0 2px" }}>{fmt0(t.totalHT)}</div>
          <div style={{ fontSize: 11, color: "rgba(250,247,242,0.6)" }}>HT · {fmt0(t.totalTTC)} TTC</div>
          {t.remise > 0 && <div style={{ fontSize: 11, color: C.gold, marginTop: 6 }}>dont remise {fmt0(t.remise)}</div>}
        </div>
        <div style={{ background: `linear-gradient(150deg, ${C.gold}, #B08F45)`, borderRadius: 18, padding: 16, color: C.navy }}>
          <div className="flex items-center gap-1" style={{ fontSize: 11, letterSpacing: "0.12em", fontWeight: 800 }}><Sparkles size={12} /> LOCATION {quote.duree} MOIS</div>
          <div style={{ ...serif, fontSize: 24, fontWeight: 700, margin: "8px 0 2px" }}>{fmt0(t.mensTotalTTC)}<span style={{ fontSize: 13 }}>/mois</span></div>
          <div style={{ fontSize: 11, opacity: 0.75 }}>TTC · maintenance {Math.round(t.tauxLocation * 100)} %/an incluse</div>
        </div>
      </div>

      {/* Télésurveillance / abonnements — facturés à part */}
      {t.abonnementHT > 0 && (
        <div className="flex items-center justify-between mb-4" style={{ background: "#FDF6E9", border: `1.5px solid ${C.gold}`, borderRadius: 14, padding: "12px 16px" }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 800, color: C.navy }}>+ Télésurveillance / abonnements</div>
            <div style={{ fontSize: 11.5, color: C.grey }}>Facturé séparément chaque mois, en plus du devis</div>
          </div>
          <div className="text-right">
            <div style={{ ...serif, fontSize: 18, fontWeight: 700, color: C.navy }}>{fmt(t.abonnementTTC)}<span style={{ fontSize: 11 }}>/mois TTC</span></div>
            <div style={{ fontSize: 11, color: C.grey }}>{fmt(t.abonnementHT)} HT</div>
          </div>
        </div>
      )}

      {/* Marge (interne uniquement) */}
      {!mc && (
        <div className="flex items-center justify-between mb-4" style={{ background: "#EFF6F1", border: `1px solid ${C.green}33`, borderRadius: 14, padding: "12px 16px" }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: C.green }}>Marge brute matériel</span>
          <span style={{ fontSize: 15, fontWeight: 800, color: C.green }}>{fmt0(t.marge)} · {Math.round(t.tauxMarge * 100)} %</span>
        </div>
      )}

      <Btn variant="dark" full onClick={onPresent}><Eye size={18} /> Présentation client</Btn>
      <div style={{ height: 10 }} />
      <Btn variant="gold" full disabled={exporting} onClick={async () => {
        setExporting(true);
        const ok = await exportQuotePdf(quote, settings);
        setExporting(false);
        if (ok) log(`Export PDF du devis ${quote.num}`);
      }}>
        <Download size={18} /> {exporting ? "Préparation du PDF (photos)…" : "Exporter le devis en PDF"}
      </Btn>
      <div style={{ height: 20 }} />
    </div>
  );
}

/* ============================ SÉLECTEUR PRODUITS ============================ */
function ProductPicker({ catalog, settings, onClose, onAdd, onRemove, quantities }) {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("all");
  const cats = allCats(settings);
  const list = catalog.filter((p) => p.actif !== false)
    .filter((p) => cat === "all" || p.cat === cat)
    .filter((p) => (p.n + p.lc + p.m).toLowerCase().includes(search.toLowerCase()));
  const groups = cats
    .map((c) => ({ ...c, prods: list.filter((p) => p.cat === c.id).sort(byOrd) }))
    .filter((g) => g.prods.length > 0);
  const orphans = list.filter((p) => !cats.some((c) => c.id === p.cat)).sort(byOrd);
  if (orphans.length) groups.push({ id: "_autres", label: "Autres", prods: orphans });
  const nbTotal = Object.values(quantities || {}).reduce((s, n) => s + n, 0);
  return (
    <div className="fixed inset-0 z-50 flex flex-col" style={{ background: C.cream, maxWidth: 480, margin: "0 auto" }}>
      <div className="flex items-center justify-between px-4 pb-4" style={{ background: C.navy, paddingTop: "calc(16px + env(safe-area-inset-top))" }}>
        <button onClick={onClose} className="flex items-center gap-1" style={{ color: C.gold, fontWeight: 700, fontSize: 15 }}>
          <ChevronLeft size={22} /> Retour
        </button>
        <span style={{ ...serif, color: C.cream, fontSize: 17, fontWeight: 700 }}>Ajouter des produits</span>
        <button onClick={onClose} style={{ color: C.gold }}><X size={24} /></button>
      </div>
      <div className="px-4 pt-3">
        <div className="relative mb-3">
          <Search size={17} style={{ position: "absolute", left: 14, top: 14, color: C.grey }} />
          <input style={{ ...inputStyle, paddingLeft: 42 }} placeholder="Rechercher…" value={search} onChange={(e) => setSearch(e.target.value)} autoFocus />
        </div>
        <div className="flex gap-2 overflow-x-auto pb-2">
          {[{ id: "all", label: "Tout" }, ...cats].map((c) => (
            <button key={c.id} onClick={() => setCat(c.id)} className="whitespace-nowrap"
              style={{ padding: "7px 14px", borderRadius: 99, fontSize: 13, fontWeight: 700, background: cat === c.id ? C.navy : C.white, color: cat === c.id ? C.gold : C.navy, border: `1px solid ${C.line}` }}>
              {c.label}
            </button>
          ))}
        </div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 pb-8 pt-1">
        {groups.map((g) => (
          <div key={g.id} className="mb-4">
            <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: "0.12em", color: C.grey, margin: "6px 0 8px" }}>
              {g.label.toUpperCase()} · {g.prods.length}
            </div>
            <div className="flex flex-col gap-2">
              {g.prods.map((p) => {
                const pv = venteOf(p, settings);
                const qty = (quantities || {})[p.id] || 0;
                return (
                  <div key={p.id} className="flex items-center gap-3"
                    style={{ background: C.white, borderRadius: 14, padding: 12, border: `1px solid ${qty > 0 ? C.orange : C.line}` }}>
                    <ProductPhoto p={p} size={50} />
                    <div className="flex-1 min-w-0">
                      <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.2 }}>{settings.modeClient ? p.lc : p.n}</div>
                      <div style={{ fontSize: 12, color: C.grey }}>
                        {settings.modeClient ? "" : `${p.m} · `}{fmt(pv)}{p.mensuel ? " /mois" : ""}
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      {qty > 0 && (
                        <>
                          <button onClick={() => onRemove(p)}
                            style={{ width: 34, height: 34, borderRadius: 10, border: `1.5px solid ${C.orange}`, color: C.orange, background: C.white }}>
                            <Minus size={16} style={{ margin: "0 auto" }} />
                          </button>
                          <span style={{ fontWeight: 800, minWidth: 24, textAlign: "center", fontSize: 16 }}>{qty}</span>
                        </>
                      )}
                      <button onClick={() => onAdd(p)}
                        style={{ width: 34, height: 34, borderRadius: 10, background: C.orange, color: C.white }}>
                        <Plus size={16} style={{ margin: "0 auto" }} />
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        {groups.length === 0 && <p className="text-center py-10" style={{ color: C.grey }}>Aucun produit trouvé.</p>}
      </div>
      <div className="px-4 pb-6">
        <Btn full onClick={onClose}><Check size={18} /> Terminé{nbTotal > 0 ? ` (${nbTotal} article${nbTotal > 1 ? "s" : ""})` : ""}</Btn>
      </div>
    </div>
  );
}

/* ============================ CATALOGUE ============================ */
function Catalog({ catalog, settings, onEdit, onNew, onMagic, magicRunning, onMove }) {
  const [search, setSearch] = useState("");
  const [cat, setCat] = useState("all");
  const [reorder, setReorder] = useState(false);
  const [dragId, setDragId] = useState(null);
  const missing = catalog.filter((p) => !p.photo && !p.img && p.m !== "FOLONEO").length;
  const cats = allCats(settings);
  const list = catalog
    .filter((p) => cat === "all" || p.cat === cat)
    .filter((p) => (p.n + p.lc + p.m).toLowerCase().includes(search.toLowerCase()));
  const groups = cats
    .map((c) => ({ ...c, prods: list.filter((p) => p.cat === c.id).sort(byOrd) }))
    .filter((g) => g.prods.length > 0);
  const orphans = list.filter((p) => !cats.some((c) => c.id === p.cat)).sort(byOrd);
  if (orphans.length) groups.push({ id: "_autres", label: "Autres", prods: orphans });

  // Glisser-déposer tactile (iPhone) : on suit le doigt et on réordonne en direct
  const handleTouchMove = (e) => {
    if (!dragId) return;
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const row = el && el.closest && el.closest("[data-pid]");
    if (row) {
      const targetId = row.getAttribute("data-pid");
      if (targetId && targetId !== dragId) {
        const dragged = catalog.find((x) => x.id === dragId);
        const target = catalog.find((x) => x.id === targetId);
        if (dragged && target && dragged.cat === target.cat) onMove(dragged, 0, targetId);
      }
    }
  };

  return (
    <div className="px-4 pt-4" onTouchMove={reorder ? handleTouchMove : undefined} onTouchEnd={() => setDragId(null)}>
      <div className="flex items-center justify-between mb-3">
        <h1 style={{ ...serif, fontSize: 26, fontWeight: 700 }}>Catalogue</h1>
        <div className="flex gap-2">
          <button onClick={() => { setReorder(!reorder); setDragId(null); }}
            style={{ padding: "8px 12px", borderRadius: 12, fontSize: 13, fontWeight: 700, background: reorder ? C.navy : C.white, color: reorder ? C.gold : C.navy, border: `1px solid ${C.line}` }}>
            ↕ {reorder ? "Terminer" : "Réorganiser"}
          </button>
          {!reorder && <Btn small onClick={onNew}><Plus size={16} /> Produit</Btn>}
        </div>
      </div>
      {reorder && (
        <p style={{ fontSize: 12.5, color: C.grey, marginBottom: 12, background: C.white, borderRadius: 12, padding: "10px 14px", border: `1px solid ${C.gold}55` }}>
          Maintiens <b>≡</b> et fais glisser pour déplacer un produit dans sa catégorie, ou utilise les flèches. Appuie sur « Terminer » quand c'est bon.
        </p>
      )}
      {!reorder && missing > 0 && (
        <button onClick={onMagic} disabled={magicRunning} className="flex items-center gap-2 w-full mb-4 active:opacity-70"
          style={{ background: C.navy, color: C.cream, borderRadius: 14, padding: "12px 16px", fontSize: 14, fontWeight: 700, opacity: magicRunning ? 0.5 : 1 }}>
          <Sparkles size={17} color={C.gold} />
          Récupérer les photos web ({missing} produit{missing > 1 ? "s" : ""} sans visuel)
        </button>
      )}
      {!reorder && (
        <div className="relative mb-3">
          <Search size={17} style={{ position: "absolute", left: 14, top: 14, color: C.grey }} />
          <input style={{ ...inputStyle, paddingLeft: 42 }} placeholder="Rechercher…" value={search} onChange={(e) => setSearch(e.target.value)} />
        </div>
      )}
      <div className="flex gap-2 overflow-x-auto pb-3">
        {[{ id: "all", label: "Tout" }, ...cats].map((c) => (
          <button key={c.id} onClick={() => setCat(c.id)} className="whitespace-nowrap"
            style={{ padding: "7px 14px", borderRadius: 99, fontSize: 13, fontWeight: 700, background: cat === c.id ? C.navy : C.white, color: cat === c.id ? C.gold : C.navy, border: `1px solid ${C.line}` }}>
            {c.label}
          </button>
        ))}
      </div>
      {groups.map((g) => (
        <div key={g.id} className="mb-5">
          <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: "0.12em", color: C.grey, marginBottom: 8 }}>
            {g.label.toUpperCase()} · {g.prods.length}
          </div>
          <div className="flex flex-col gap-2">
            {g.prods.map((p, idx) => {
              const pa = achatOf(p);
              const pv = venteOf(p, settings);
              const isDragging = dragId === p.id;
              return (
                <div key={p.id} data-pid={p.id}
                  className="flex items-center gap-3"
                  style={{
                    background: isDragging ? "#FFF3EC" : C.white, borderRadius: 14, padding: 12,
                    border: `1px solid ${isDragging ? C.orange : C.line}`, opacity: p.actif === false ? 0.45 : 1,
                    boxShadow: isDragging ? "0 6px 18px rgba(230,90,31,0.25)" : "none",
                  }}>
                  {reorder && (
                    <span onTouchStart={() => setDragId(p.id)}
                      style={{ touchAction: "none", fontSize: 22, color: C.grey, padding: "4px 6px", cursor: "grab", userSelect: "none" }}>
                      ≡
                    </span>
                  )}
                  <button onClick={() => !reorder && onEdit(p)} className="flex items-center gap-3 flex-1 min-w-0 text-left" style={{ pointerEvents: reorder ? "none" : "auto" }}>
                    <ProductPhoto p={p} size={52} />
                    <div className="flex-1 min-w-0">
                      <div style={{ fontSize: 14, fontWeight: 700, lineHeight: 1.2 }}>{settings.modeClient ? p.lc : p.n}{p.mensuel ? " · /mois" : ""}</div>
                      {!reorder && <div style={{ fontSize: 12, color: C.grey, lineHeight: 1.3 }}>{settings.modeClient ? "" : p.lc}</div>}
                      {!reorder && (
                        <div style={{ fontSize: 12, marginTop: 2 }}>
                          <span style={{ fontWeight: 800, color: C.orange }}>{fmt(pv)}{p.mensuel ? "/mois" : ""}</span>
                          {!settings.modeClient && !p.mensuel && <span style={{ color: C.grey }}> · achat {fmt(pa)}</span>}
                        </div>
                      )}
                    </div>
                  </button>
                  {reorder ? (
                    <div className="flex gap-1.5">
                      <button onClick={() => onMove(p, -1)} disabled={idx === 0}
                        style={{ width: 36, height: 36, borderRadius: 10, background: C.navy, color: C.gold, opacity: idx === 0 ? 0.3 : 1, fontSize: 16, fontWeight: 800 }}>↑</button>
                      <button onClick={() => onMove(p, 1)} disabled={idx === g.prods.length - 1}
                        style={{ width: 36, height: 36, borderRadius: 10, background: C.navy, color: C.gold, opacity: idx === g.prods.length - 1 ? 0.3 : 1, fontSize: 16, fontWeight: 800 }}>↓</button>
                    </div>
                  ) : (
                    <Edit3 size={17} color={C.grey} />
                  )}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

/* ============================ FICHE PRODUIT ============================ */
function ProductForm({ product, settings, onSave, onDelete, onClose }) {
  const [p, setP] = useState(product || { m: "Ajax", n: "", lc: "", cat: "alarme", ref: "", pa: null, pv: null, photo: null, img: null, actif: true });
  const [searching, setSearching] = useState(false);
  const fileRef = useRef(null);
  const searchPhoto = async () => {
    if (!p.n) return;
    setSearching(true);
    const url = await findWebImage(p);
    setSearching(false);
    if (url) setP((x) => ({ ...x, img: url }));
    else window.alert("Aucune photo trouvée sur le web pour ce produit. Tu peux en prendre une ou l'importer depuis ta galerie.");
  };
  const paAuto = achatFrom(p.m, Number(p.ref) || 0);
  const paManual = p.pa != null; // en cours de saisie manuelle (même vide)
  const paHas = p.pa != null && p.pa !== "";
  const pa = paHas ? Number(p.pa) : paAuto;
  const pvAuto = pa * (settings.coefs[p.cat] ?? 3);
  const pvManual = p.pv != null;
  const pvHas = p.pv != null && p.pv !== "";
  const pvFinal = pvHas ? Number(p.pv) : pvAuto;

  const handlePhoto = async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    try {
      const data = await compressImage(f);
      setP((x) => ({ ...x, photo: data }));
    } catch { /* photo illisible */ }
  };

  return (
    <div className="fixed inset-0 z-50 flex flex-col overflow-y-auto" style={{ background: C.cream, maxWidth: 480, margin: "0 auto" }}>
      <div className="flex items-center justify-between px-4 pb-4 sticky top-0 z-10" style={{ background: C.navy, paddingTop: "calc(16px + env(safe-area-inset-top))" }}>
        <button onClick={onClose} className="flex items-center gap-1" style={{ color: C.gold, fontWeight: 700, fontSize: 15 }}>
          <ChevronLeft size={22} /> Retour
        </button>
        <span style={{ ...serif, color: C.cream, fontSize: 17, fontWeight: 700 }}>{product ? "Modifier le produit" : "Nouveau produit"}</span>
        <button onClick={onClose} style={{ color: C.gold }}><X size={24} /></button>
      </div>
      <div className="px-4 py-4">
        {/* Photo */}
        <div className="flex items-center gap-4 mb-3">
          {p.photo || p.img ? (
            <img src={p.photo || p.img} alt="" style={{ width: 88, height: 88, borderRadius: 16, objectFit: p.photo ? "cover" : "contain", background: C.white, border: `2px solid ${C.gold}` }} />
          ) : (
            <div className="flex items-center justify-center" style={{ width: 88, height: 88, borderRadius: 16, background: C.navy }}>
              <Camera size={30} color={C.gold} />
            </div>
          )}
          <div className="flex flex-col gap-2 flex-1">
            <Btn small variant="gold" onClick={searchPhoto} disabled={searching || !p.n}>
              <Sparkles size={15} /> {searching ? "Recherche en cours…" : "Trouver la photo sur le web"}
            </Btn>
            <Btn small variant="dark" onClick={() => fileRef.current?.click()}><Camera size={15} /> Photo / galerie iPhone</Btn>
            {(p.photo || p.img) && <Btn small variant="danger" onClick={() => setP((x) => ({ ...x, photo: null, img: null }))}><Trash2 size={14} /> Retirer</Btn>}
            <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handlePhoto} />
          </div>
        </div>
        <Field label="OU COLLER UNE URL D'IMAGE">
          <input style={inputStyle} type="url" value={p.img || ""} placeholder="https://…" onChange={(e) => setP((x) => ({ ...x, img: e.target.value || null }))} />
        </Field>

        <Field label="MARQUE">
          <div className="flex gap-2">
            {["Ajax", "Dahua", "Autre", "FOLONEO"].map((m) => (
              <button key={m} onClick={() => setP((x) => ({ ...x, m }))} className="flex-1 font-bold"
                style={{ padding: "10px 0", borderRadius: 12, fontSize: 13, background: p.m === m ? C.navy : C.white, color: p.m === m ? C.gold : C.navy, border: `1px solid ${C.line}` }}>
                {m}
              </button>
            ))}
          </div>
        </Field>
        <Field label="NOM (INTERNE)"><input style={inputStyle} value={p.n} placeholder="Ex. Hub 2 Plus" onChange={(e) => setP((x) => ({ ...x, n: e.target.value }))} /></Field>
        <Field label="LIBELLÉ CLIENT (SANS MARQUE)"><input style={inputStyle} value={p.lc} placeholder="Ex. Centrale d'alarme WiFi + 4G" onChange={(e) => setP((x) => ({ ...x, lc: e.target.value }))} /></Field>
        <Field label="CATÉGORIE">
          <select style={inputStyle} value={p.cat} onChange={(e) => setP((x) => ({ ...x, cat: e.target.value }))}>
            {allCats(settings).map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
        </Field>
        <button onClick={() => setP((x) => ({ ...x, mensuel: !x.mensuel }))}
          className="flex items-center justify-between w-full mb-4"
          style={{ background: p.mensuel ? "#FDF6E9" : C.white, border: `1.5px solid ${p.mensuel ? C.gold : C.line}`, borderRadius: 14, padding: "13px 16px" }}>
          <div className="text-left">
            <div style={{ fontSize: 14, fontWeight: 700 }}>Facturation mensuelle séparée</div>
            <div style={{ fontSize: 12, color: C.grey }}>Télésurveillance, abonnement… Non ajouté au total du devis, affiché en €/mois à part.</div>
          </div>
          <div style={{ width: 46, height: 27, borderRadius: 99, background: p.mensuel ? C.gold : C.line, position: "relative", flexShrink: 0, transition: "background .2s" }}>
            <div style={{ width: 21, height: 21, borderRadius: 99, background: C.white, position: "absolute", top: 3, left: p.mensuel ? 22 : 3, transition: "left .2s" }} />
          </div>
        </button>
        <Field label={p.m === "Ajax" ? "TARIF SYLIS HT (RÉFÉRENCE)" : p.m === "Dahua" ? "PRIX MARCHÉ TTC (RÉFÉRENCE)" : "PRIX DE RÉFÉRENCE"}>
          <input style={inputStyle} type="number" inputMode="decimal" value={p.ref} onChange={(e) => setP((x) => ({ ...x, ref: e.target.value }))} />
        </Field>
        <Field label={paManual ? "PRIX D'ACHAT HT — SAISI MANUELLEMENT" : `PRIX D'ACHAT HT — AUTOMATIQUE (${p.m === "Ajax" ? "SYLIS × 0,45" : p.m === "Dahua" ? "MARCHÉ ÷ 1,20 × 0,45" : "= RÉFÉRENCE"})`}>
          <input style={{ ...inputStyle, borderColor: paManual ? C.orange : C.line }} type="number" inputMode="decimal"
            value={paManual ? p.pa : paAuto ? Number(paAuto.toFixed(2)) : ""}
            onChange={(e) => setP((x) => ({ ...x, pa: e.target.value }))} />
          {paManual && (
            <button onClick={() => setP((x) => ({ ...x, pa: null }))} className="mt-2 font-bold" style={{ fontSize: 13, color: C.orange }}>
              ↻ Revenir au calcul automatique ({fmt(paAuto)})
            </button>
          )}
        </Field>
        <Field label={pvManual ? "PRIX DE VENTE HT — MODIFIÉ MANUELLEMENT" : `PRIX DE VENTE HT — AUTOMATIQUE (ACHAT × ${settings.coefs[p.cat] ?? 3})`}>
          <input style={{ ...inputStyle, borderColor: pvManual ? C.orange : C.line, fontWeight: 700 }} type="number" inputMode="decimal"
            value={pvManual ? p.pv : pvAuto ? Number(pvAuto.toFixed(2)) : ""}
            onChange={(e) => setP((x) => ({ ...x, pv: e.target.value }))} />
          {pvManual && (
            <button onClick={() => setP((x) => ({ ...x, pv: null }))} className="mt-2 font-bold" style={{ fontSize: 13, color: C.orange }}>
              ↻ Revenir au prix automatique ({fmt(pvAuto)})
            </button>
          )}
        </Field>

        {/* Récap calcul */}
        <div style={{ background: C.white, borderRadius: 14, border: `1px solid ${C.line}`, padding: 14, marginBottom: 16 }}>
          <div className="flex justify-between mb-1" style={{ fontSize: 13 }}>
            <span style={{ color: C.grey }}>Prix d'achat {paHas ? "(manuel)" : "(auto)"}</span><b>{fmt(pa)}</b>
          </div>
          <div className="flex justify-between mb-1" style={{ fontSize: 13 }}><span style={{ color: C.grey }}>Coefficient {p.cat}</span><b>× {settings.coefs[p.cat] ?? 3}</b></div>
          <div className="flex justify-between mb-1" style={{ fontSize: 14 }}>
            <span style={{ color: C.grey }}>Prix de vente {pvHas ? "(manuel)" : "(auto)"}</span>
            <b style={{ color: C.orange }}>{fmt(pvFinal)}</b>
          </div>
          <div className="flex justify-between" style={{ fontSize: 13 }}>
            <span style={{ color: C.grey }}>Marge unitaire</span>
            <b style={{ color: C.green }}>{fmt(pvFinal - pa)}</b>
          </div>
        </div>

        <div className="flex flex-col gap-3 pb-10">
          <Btn full onClick={() => p.n && onSave({ ...p, pa: p.pa === "" ? null : p.pa, pv: p.pv === "" ? null : p.pv })} disabled={!p.n}><Save size={18} /> Enregistrer</Btn>
          {product && (
            <Btn full variant="ghost" onClick={() => onSave({ ...p, actif: p.actif === false })}>
              {p.actif === false ? <><CheckCircle2 size={17} /> Réactiver le produit</> : <><EyeOff size={17} /> Désactiver (masquer des devis)</>}
            </Btn>
          )}
          {product && <Btn full variant="danger" onClick={() => onDelete(p)}><Trash2 size={17} /> Supprimer définitivement</Btn>}
        </div>
      </div>
    </div>
  );
}

/* ============================ RÉGLAGES ============================ */
function SettingsScreen({ settings, setSettings, onExport, onImport, log }) {
  const importRef = useRef(null);
  const [newCat, setNewCat] = useState("");
  const setCoef = (cat, v) => setSettings((s) => ({ ...s, coefs: { ...s.coefs, [cat]: Number(v) || 0 } }));
  const addCat = () => {
    const label = newCat.trim();
    if (!label) return;
    const id = "c_" + label.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "_").slice(0, 24);
    if (allCats(settings).some((c) => c.id === id || c.label.toLowerCase() === label.toLowerCase())) {
      window.alert("Cette catégorie existe déjà."); return;
    }
    setSettings((s) => ({ ...s, customCats: [...(s.customCats || []), { id, label }], coefs: { ...s.coefs, [id]: 3.0 } }));
    log(`Création de la catégorie « ${label} »`);
    setNewCat("");
  };
  const removeCat = (c) => {
    if (!window.confirm(`Supprimer la catégorie « ${c.label} » ? Les produits qu'elle contient ne seront PAS supprimés (ils passeront dans « Autres »).`)) return;
    setSettings((s) => ({ ...s, customCats: (s.customCats || []).filter((x) => x.id !== c.id) }));
    log(`Suppression de la catégorie « ${c.label} »`);
  };
  return (
    <div className="px-4 pt-4 pb-10">
      <h1 style={{ ...serif, fontSize: 26, fontWeight: 700, marginBottom: 16 }}>Réglages</h1>

      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12 }}>Coefficients de vente par catégorie</div>
        {allCats(settings).filter((c) => c.id !== "prestation").map((c) => (
          <div key={c.id} className="flex items-center justify-between mb-2">
            <span style={{ fontSize: 14 }}>{c.label}</span>
            <input style={{ ...inputStyle, width: 90, textAlign: "center", padding: "8px" }} type="number" inputMode="decimal" step="0.1"
              value={settings.coefs[c.id] ?? 3} onChange={(e) => setCoef(c.id, e.target.value)} />
          </div>
        ))}
      </section>

      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Mes catégories</div>
        <p style={{ fontSize: 12, color: C.grey, marginBottom: 12 }}>Crée tes propres catégories (ex. Télésurveillance, Brouillard, Domotique). Elles apparaissent dans le catalogue, les devis et les fiches produit.</p>
        <div className="flex gap-2 mb-3">
          <input style={{ ...inputStyle, flex: 1 }} placeholder="Nom de la catégorie…" value={newCat} onChange={(e) => setNewCat(e.target.value)} />
          <Btn small onClick={addCat} disabled={!newCat.trim()}><Plus size={15} /> Créer</Btn>
        </div>
        {(settings.customCats || []).map((c) => (
          <div key={c.id} className="flex items-center justify-between py-2" style={{ borderBottom: `1px solid ${C.line}` }}>
            <span style={{ fontSize: 14, fontWeight: 600 }}>{c.label}</span>
            <button onClick={() => removeCat(c)} style={{ color: C.red, fontSize: 13, fontWeight: 700 }}>Supprimer</button>
          </div>
        ))}
        {(settings.customCats || []).length === 0 && <p style={{ fontSize: 13, color: C.grey }}>Aucune catégorie personnalisée pour l'instant.</p>}
      </section>

      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Location — taux annuels</div>
        <p style={{ fontSize: 12, color: C.grey, marginBottom: 12 }}>Mensualité = (prix TTC + taux × années) ÷ nombre de mois</p>
        <div className="flex items-center justify-between mb-2">
          <span style={{ fontSize: 14 }}>Taux si devis ≤ seuil (%/an)</span>
          <input style={{ ...inputStyle, width: 90, textAlign: "center", padding: "8px" }} type="number" inputMode="decimal" step="0.5"
            value={settings.location.tauxBas} onChange={(e) => setSettings((s) => ({ ...s, location: { ...s.location, tauxBas: Number(e.target.value) || 0 } }))} />
        </div>
        <div className="flex items-center justify-between mb-2">
          <span style={{ fontSize: 14 }}>Taux si devis &gt; seuil (%/an)</span>
          <input style={{ ...inputStyle, width: 90, textAlign: "center", padding: "8px" }} type="number" inputMode="decimal" step="0.5"
            value={settings.location.tauxHaut} onChange={(e) => setSettings((s) => ({ ...s, location: { ...s.location, tauxHaut: Number(e.target.value) || 0 } }))} />
        </div>
        <div className="flex items-center justify-between">
          <span style={{ fontSize: 14 }}>Seuil (€ TTC)</span>
          <input style={{ ...inputStyle, width: 110, textAlign: "center", padding: "8px" }} type="number" inputMode="decimal"
            value={settings.location.seuil} onChange={(e) => setSettings((s) => ({ ...s, location: { ...s.location, seuil: Number(e.target.value) || 0 } }))} />
        </div>
      </section>

      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div className="flex items-center justify-between">
          <span style={{ fontWeight: 700, fontSize: 14 }}>TVA (%)</span>
          <input style={{ ...inputStyle, width: 90, textAlign: "center", padding: "8px" }} type="number" inputMode="decimal"
            value={settings.tva} onChange={(e) => setSettings((s) => ({ ...s, tva: Number(e.target.value) || 0 }))} />
        </div>
      </section>

      <section style={{ background: C.white, borderRadius: 16, padding: 16, border: `1px solid ${C.line}`, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Sauvegarde de sécurité</div>
        <p style={{ fontSize: 13, color: C.grey, marginBottom: 12 }}>Tout est déjà enregistré automatiquement. L'export JSON ajoute une copie externe.</p>
        <div className="flex gap-3">
          <Btn small variant="dark" onClick={onExport}><Download size={15} /> Exporter</Btn>
          <Btn small variant="ghost" onClick={() => importRef.current?.click()}><Upload size={15} /> Importer</Btn>
          <input ref={importRef} type="file" accept="application/json" style={{ display: "none" }}
            onChange={(e) => e.target.files?.[0] && onImport(e.target.files[0])} />
        </div>
      </section>

      <p style={{ fontSize: 12, color: C.grey, textAlign: "center", marginTop: 20 }}>
        FOLONEO · On veille, vous dormez.<br />Devis Terrain <b>v11</b> — PDF avec présentation & photos
      </p>
    </div>
  );
}

/* ============================ PRÉSENTATION CLIENT ============================ */
function ClientPresentation({ quote, settings, onClose }) {
  const t = computeQuote(quote, settings);
  const [option, setOption] = useState("psge");
  return (
    <div className="fixed inset-0 z-50 flex flex-col overflow-y-auto" style={{ background: C.navy, maxWidth: 480, margin: "0 auto", color: C.cream }}>
      <div className="flex items-center justify-between px-5" style={{ paddingTop: "calc(18px + env(safe-area-inset-top))" }}>
        <button onClick={onClose} className="flex items-center gap-1" style={{ color: C.gold, fontWeight: 700, fontSize: 15 }}>
          <ChevronLeft size={22} /> Retour
        </button>
        <div className="text-right">
          <div style={{ ...serif, fontSize: 20, fontWeight: 700 }}>FOLONEO</div>
          <div style={{ color: C.gold, fontSize: 9, letterSpacing: "0.2em", marginTop: 2 }}>ON VEILLE, VOUS DORMEZ.</div>
        </div>
      </div>

      <div className="px-5 mt-6">
        <div style={{ fontSize: 13, color: "rgba(250,247,242,0.55)" }}>Proposition {quote.num} · {dateFR(quote.date)}</div>
        <div style={{ ...serif, fontSize: 26, fontWeight: 700, marginTop: 4 }}>{quote.client.nom || "Votre projet de sécurité"}</div>
        {quote.client.ville && <div className="flex items-center gap-1 mt-1" style={{ fontSize: 14, color: "rgba(250,247,242,0.65)" }}><MapPin size={14} /> {quote.client.ville}</div>}
      </div>

      {/* Sélecteur d'option */}
      <div className="flex gap-2 px-5 mt-6">
        {[{ id: "achat", l: "Achat" }, { id: "psge", l: `Location · ${quote.duree} mois` }].map((o) => (
          <button key={o.id} onClick={() => setOption(o.id)} className="flex-1 font-bold"
            style={{ padding: "12px 0", borderRadius: 14, fontSize: 14, background: option === o.id ? C.gold : "rgba(255,255,255,0.07)", color: option === o.id ? C.navy : C.cream }}>
            {o.l}
          </button>
        ))}
      </div>

      {option === "achat" ? (
        <div className="px-5 mt-6">
          <div className="flex flex-col gap-3 mb-6">
            {quote.lignes.map((l) => (
              <div key={l.pid} className="flex items-center gap-3" style={{ background: "rgba(255,255,255,0.05)", borderRadius: 14, padding: 12 }}>
                <ProductPhoto p={l} size={46} />
                <div className="flex-1">
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{l.lc || l.n}</div>
                  <div style={{ fontSize: 12, color: "rgba(250,247,242,0.55)" }}>Quantité : {l.qty}{l.mensuel ? " · facturé mensuellement" : ""}</div>
                </div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.gold }}>{fmt0(l.pv * l.qty)}{l.mensuel ? "/mois" : ""}</div>
              </div>
            ))}
          </div>
          <div style={{ borderTop: `1px solid rgba(201,169,97,0.3)`, paddingTop: 16 }}>
            {t.remise > 0 && <div className="flex justify-between mb-2" style={{ fontSize: 14 }}><span style={{ color: "rgba(250,247,242,0.6)" }}>Remise</span><span>− {fmt0(t.remise)}</span></div>}
            <div className="flex justify-between mb-1" style={{ fontSize: 15 }}><span>Total HT</span><b>{fmt(t.totalHT)}</b></div>
            <div className="flex justify-between mb-1" style={{ fontSize: 13, color: "rgba(250,247,242,0.55)" }}><span>TVA {settings.tva} %</span><span>{fmt(t.tva)}</span></div>
            <div className="flex justify-between items-baseline mt-3">
              <span style={{ fontSize: 15, fontWeight: 700 }}>Total TTC</span>
              <span style={{ ...serif, fontSize: 32, fontWeight: 700, color: C.gold }}>{fmt(t.totalTTC)}</span>
            </div>
            {t.abonnementTTC > 0 && (
              <div className="flex justify-between items-center mt-3" style={{ background: "rgba(201,169,97,0.12)", borderRadius: 12, padding: "11px 14px" }}>
                <span style={{ fontSize: 13 }}>+ Télésurveillance (facturée à part)</span>
                <b style={{ fontSize: 15, color: C.gold }}>{fmt(t.abonnementTTC)}/mois TTC</b>
              </div>
            )}
            <p style={{ fontSize: 12, color: "rgba(250,247,242,0.5)", marginTop: 12 }}>Vous êtes propriétaire de votre matériel, sans location imposée.</p>
          </div>
        </div>
      ) : (
        <div className="px-5 mt-8 text-center">
          <div style={{ fontSize: 13, letterSpacing: "0.15em", color: C.gold, fontWeight: 700 }}>FORMULE LOCATION TOUT INCLUS</div>
          <div style={{ ...serif, fontSize: 58, fontWeight: 700, color: C.gold, marginTop: 20, lineHeight: 1 }}>{fmt0(t.mensTotalTTC)}</div>
          <div style={{ fontSize: 15, color: "rgba(250,247,242,0.7)", marginTop: 6 }}>TTC par mois · engagement {quote.duree} mois</div>
          {t.abonnementTTC > 0 && (
            <div style={{ fontSize: 14, color: C.gold, marginTop: 10, fontWeight: 700 }}>+ {fmt(t.abonnementTTC)}/mois TTC de télésurveillance (facturée à part)</div>
          )}
          <div className="flex flex-col gap-3 mt-10 text-left">
            {["Matériel professionnel installé et paramétré", "Maintenance annuelle incluse", "Assistance et suivi FOLONEO", "Un seul montant mensuel, sans surprise"].map((x, i) => (
              <div key={i} className="flex items-center gap-3" style={{ background: "rgba(255,255,255,0.05)", borderRadius: 12, padding: "13px 16px" }}>
                <CheckCircle2 size={18} color={C.gold} />
                <span style={{ fontSize: 14 }}>{x}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{ height: 50 }} />
    </div>
  );
}

root.render(<App />);
setTimeout(() => { const s = document.getElementById("splash"); if (s) s.remove(); }, 600);
</script>
